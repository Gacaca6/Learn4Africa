# ---------------------------------------------------------------------------
# Learn4Africa — container orchestration.
#
# This compose file reflects the ACTUAL stack, not the aspirational one:
#   - MongoDB is the primary store (auth + progress + portfolio).
#   - Postgres is NOT wired up (SQLAlchemy sits behind a lazy engine that
#     returns None when no URL is set — kept for future analytics).
#   - Redis is NOT wired up (no runtime code imports it).
#   - Ollama is optional. Without it, endpoints that rely on the LLM
#     return clear error messages; everything else keeps working.
#
# Ports:
#   frontend → 3000  (Next.js)
#   backend  → 8001  (FastAPI; internally the container still binds :8000)
#   mongo    → 27017
#   ollama   → 11434
#
# Secrets:
#   Never commit real values for AUTH_SECRET / JWT_SECRET_KEY /
#   GOOGLE_CLIENT_* / HF_TOKEN. Populate them via a local `.env` file
#   (see `.env.example`) — compose auto-loads that.
# ---------------------------------------------------------------------------

version: "3.9"

services:
  # ── Frontend (Next.js) ─────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      # In-container the frontend talks to `backend` by service name.
      NEXT_PUBLIC_API_URL: "http://backend:8000"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      AUTH_SECRET: "${AUTH_SECRET:?AUTH_SECRET must be set — see .env.example}"
      AUTH_GOOGLE_ID: "${AUTH_GOOGLE_ID:-}"
      AUTH_GOOGLE_SECRET: "${AUTH_GOOGLE_SECRET:-}"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── Backend (FastAPI) ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      # Auth — pydantic-settings maps JWT_SECRET → settings.jwt_secret.
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set — see .env.example}"
      JWT_ALGORITHM: "HS256"
      JWT_EXPIRE_HOURS: "${JWT_EXPIRE_HOURS:-168}"
      REFRESH_EXPIRE_DAYS: "${REFRESH_EXPIRE_DAYS:-30}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"

      # CORS — the backend rejects "*" because NextAuth sends cookies.
      # Override with a comma-separated list in .env if the frontend
      # ships under a different origin.
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3000,http://frontend:3000}"

      # Storage — pydantic-settings maps MONGODB_URI → settings.mongodb_uri.
      MONGODB_URI: "mongodb://mongo:27017"
      MONGODB_DB_NAME: "${MONGODB_DB_NAME:-learn4africa}"

      # AI providers (all optional)
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-minimax-m2:cloud}"
      AI_PROVIDER: "${AI_PROVIDER:-ollama}"
      TTS_PROVIDER: "${TTS_PROVIDER:-edge}"
      IMAGE_PROVIDER: "${IMAGE_PROVIDER:-huggingface}"
      HF_TOKEN: "${HF_TOKEN:-}"
    volumes:
      # Code hot-reload for dev; remove this in a prod compose override.
      - ./backend:/app
      # Persist generated podcasts/comics/songs across container restarts.
      - media_data:/app/media
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8000/health\", timeout=3).status == 200 else 1)'"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ── MongoDB (primary store) ────────────────────────────────────────
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  # ── Ollama (optional local LLM) ────────────────────────────────────
  # No GPU reservation here — the image runs CPU-only by default, which
  # is slow but works on every machine. Judges without a GPU can still
  # demo the platform; the original `nvidia` reservation broke startup
  # on any host that lacked the container runtime.
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles: ["ai"] # start with `docker compose --profile ai up`
    restart: unless-stopped

volumes:
  mongo_data:
  ollama_data:
  media_data:
