# ============================================================================
# Learn4Africa — Render Blueprint
# ============================================================================
# One-click deploy for BOTH frontend and backend on Render.
#
# Usage:
#   1. https://dashboard.render.com/blueprints → New Blueprint Instance
#   2. Connect GitHub → pick Gacaca6/Learn4Africa
#   3. Render detects this file and creates both services
#   4. Fill in the "sync: false" vars in the dashboard (one-time)
#   5. Redeploy — done.
#
# Full step-by-step is in DEPLOY.md at the repo root.
# ============================================================================

services:
  # ────────────────────────────────────────────────────────────────────────
  # Backend — FastAPI on Python 3.13
  # ────────────────────────────────────────────────────────────────────────
  - type: web
    name: learn4africa-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # --- Auto-generated by Render (never touch these) ------------------
      - key: JWT_SECRET
        generateValue: true

      # --- Fixed values (safe to commit) ---------------------------------
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_HOURS
        value: "168"
      - key: REFRESH_EXPIRE_DAYS
        value: "30"
      - key: MONGODB_DB_NAME
        value: learn4africa
      - key: AI_PROVIDER
        value: openai
      - key: TTS_PROVIDER
        value: edge
      - key: IMAGE_PROVIDER
        value: none

      # --- You fill these in the Render dashboard (one-time) -------------
      - key: MONGODB_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: HF_API_TOKEN
        sync: false
      # CORS_ORIGINS must match your frontend URL. After first deploy you'll
      # see the frontend URL on the Render dashboard — paste it here. Example:
      #   https://learn4africa-frontend.onrender.com
      - key: CORS_ORIGINS
        sync: false

  # ────────────────────────────────────────────────────────────────────────
  # Frontend — Next.js 14 on Node 20
  # ────────────────────────────────────────────────────────────────────────
  - type: web
    name: learn4africa-frontend
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      # --- Auto-generated by Render --------------------------------------
      - key: AUTH_SECRET
        generateValue: true

      # --- Fixed values --------------------------------------------------
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_APP_NAME
        value: Learn4Africa

      # --- You fill these in the Render dashboard (one-time) -------------
      # After first deploy, Render will show you the URLs for both services.
      # Paste the backend URL (https://learn4africa-backend.onrender.com or
      # whatever Render gave you) into NEXT_PUBLIC_API_URL.
      # Paste the frontend URL into NEXT_PUBLIC_APP_URL and NEXTAUTH_URL.
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: AUTH_GOOGLE_ID
        sync: false
      - key: AUTH_GOOGLE_SECRET
        sync: false
