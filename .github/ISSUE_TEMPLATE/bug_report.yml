name: Bug report
description: Something is broken or behaves unexpectedly
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. The more detail
        you give, the faster we can fix it.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
      placeholder: When I click "Sign in with Google" the page reloads but I stay logged out.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to /auth/login
        2. Click "Continue with Google"
        3. Complete the Google flow
        4. Land back on / — header still shows "Sign in"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "Chrome 130 on Windows 11 / npm dev / backend uvicorn :8001 / Mongo Atlas"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Drop in the X-Request-ID from the response header if you have one.
      render: shell
